<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULEReminders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f2ec; --surface:#fffdf8; --surface2:#efece3; --inset:#e7e3d8;
  --border:#e0dccf; --border2:#cdc8b8;
  --text:#23211c; --text2:#6c685c; --text3:#9c978a;
  --accent:#b4471f; --accent-bg:#fbeae2; --accent-border:#eec3ad;
  --open:#8a5c00; --open-bg:#fbf0d6; --open-bd:#ecd194;
  --prog:#1a5fa8; --prog-bg:#e6f0fa; --prog-bd:#b3d1ee;
  --done:#2d7a3a; --done-bg:#e4f3e7; --done-bd:#a6d6ad;
  --sidebar:#211f1a; --sidebar-bd:rgba(255,255,255,.08);
  --shadow:0 1px 2px rgba(40,35,25,.04),0 8px 24px rgba(40,35,25,.06);
}
[data-theme="dark"]{
  --bg:#16150f; --surface:#201e18; --surface2:#2a2820; --inset:#1a1812;
  --border:#322f26; --border2:#403c30;
  --text:#f1ede2; --text2:#a8a290; --text3:#6f6a5c;
  --accent:#e0743f; --accent-bg:#33231a; --accent-border:#5a3a28;
  --open:#e0b24a; --open-bg:#2e2716; --open-bd:#4d4322;
  --prog:#5b9ddc; --prog-bg:#152634; --prog-bd:#26425c;
  --done:#5fb56e; --done-bg:#16291a; --done-bd:#27442d;
  --sidebar:#0e0d09; --sidebar-bd:rgba(255,255,255,.06);
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;font-size:15px;line-height:1.5}
h1,h2,h3,.display{font-family:'Fraunces',serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:15px}
.hidden{display:none!important}

/* ---------- AUTH ---------- */
#auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(120% 90% at 20% 0%,var(--accent-bg) 0%,var(--bg) 55%)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:40px;width:100%;max-width:400px;box-shadow:var(--shadow)}
.brand{display:flex;align-items:center;gap:11px;margin-bottom:6px}
.brand .mark{width:42px;height:42px;border-radius:12px;background:var(--accent);
  display:grid;place-items:center;color:#fff;font-family:'Fraunces';font-weight:700;font-size:22px;flex:none}
.brand .name{font-family:'Fraunces';font-weight:700;font-size:24px;letter-spacing:-.5px}
.auth-card p.sub{color:var(--text2);margin:10px 0 26px;font-size:14px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px}
.field input{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:10px;
  background:var(--inset);color:var(--text);outline:none;transition:.15s}
.field input:focus{border-color:var(--accent);background:var(--surface)}
.btn{padding:11px 18px;border-radius:10px;font-weight:600;font-size:15px;transition:.15s;
  display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:var(--accent);color:#fff;width:100%}
.btn-primary:hover{filter:brightness(1.07)}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border2)}
.err{color:var(--accent);font-size:13px;margin-top:10px;min-height:18px;font-weight:500}

/* ---------- LAYOUT ---------- */
#app{display:flex;min-height:100vh}
.sidebar{width:248px;background:var(--sidebar);color:#e8e4d8;display:flex;flex-direction:column;
  padding:22px 16px;position:sticky;top:0;height:100vh;flex:none}
.sidebar .brand .name{color:#fff}
.sidebar-sec{margin-top:26px}
.sidebar-sec h4{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:rgba(255,255,255,.4);
  margin-bottom:10px;font-weight:700;font-family:'Outfit'}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:9px;
  color:rgba(255,255,255,.72);font-size:14px;font-weight:500;width:100%;text-align:left;transition:.12s}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:var(--accent);color:#fff}
.nav-count{margin-left:auto;font-size:12px;opacity:.7;font-weight:600}
.sidebar-foot{margin-top:auto;padding-top:18px;border-top:1px solid var(--sidebar-bd)}
.user-chip{display:flex;align-items:center;gap:9px;font-size:13px;color:rgba(255,255,255,.8)}
.user-chip .av{width:30px;height:30px;border-radius:50%;background:var(--accent);display:grid;
  place-items:center;font-weight:700;color:#fff;font-size:13px;flex:none}
.linkbtn{font-size:12.5px;color:rgba(255,255,255,.55);background:none;padding:4px 0}
.linkbtn:hover{color:#fff}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:14px;padding:20px 30px;border-bottom:1px solid var(--border);
  background:var(--surface);position:sticky;top:0;z-index:20}
.topbar h1{font-size:24px;font-weight:600;letter-spacing:-.5px}
.search{flex:1;max-width:340px;position:relative}
.search input{width:100%;padding:9px 13px 9px 34px;border:1px solid var(--border);border-radius:10px;
  background:var(--inset);color:var(--text);outline:none}
.search input:focus{border-color:var(--accent)}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3)}
.content{padding:24px 30px 60px;flex:1}

/* ---------- FILTERS ---------- */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px;align-items:center}
.chip{padding:6px 13px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);transition:.12s}
.chip:hover{border-color:var(--border2)}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.filters select{padding:7px 11px;border:1px solid var(--border);border-radius:9px;background:var(--surface);
  color:var(--text);outline:none}
.spacer{flex:1}

/* ---------- TILE GRID ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;
  box-shadow:var(--shadow);cursor:pointer;transition:.15s;display:flex;flex-direction:column;gap:11px;
  position:relative;overflow:hidden}
.tile:hover{transform:translateY(-2px);border-color:var(--border2)}
.tile::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--open)}
.tile[data-s="in_progress"]::before{background:var(--prog)}
.tile[data-s="done"]::before{background:var(--done)}
.tile-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.tile h3{font-size:17px;font-weight:600;letter-spacing:-.3px;line-height:1.3}
.status-pill{font-size:11px;font-weight:700;padding:4px 9px;border-radius:6px;white-space:nowrap;flex:none;
  text-transform:uppercase;letter-spacing:.4px}
.s-open{background:var(--open-bg);color:var(--open);border:1px solid var(--open-bd)}
.s-in_progress{background:var(--prog-bg);color:var(--prog);border:1px solid var(--prog-bd)}
.s-done{background:var(--done-bg);color:var(--done);border:1px solid var(--done-bd)}
.tile-desc{color:var(--text2);font-size:13.5px;display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden}
.meta-row{display:flex;flex-wrap:wrap;gap:6px}
.meta{font-size:12px;color:var(--text2);background:var(--surface2);padding:3px 9px;border-radius:6px;
  display:inline-flex;align-items:center;gap:5px;border:1px solid var(--border)}
.meta b{color:var(--text);font-weight:600}
.tile-foot{display:flex;align-items:center;gap:14px;margin-top:auto;padding-top:4px;
  font-size:12px;color:var(--text3)}
.tile-foot span{display:inline-flex;align-items:center;gap:4px}
.tag{font-size:11px;background:var(--accent-bg);color:var(--accent);padding:2px 8px;border-radius:5px;
  border:1px solid var(--accent-border);font-weight:600}
.tile-badges{display:flex;gap:6px;align-items:center;flex:none}
.new-pill{font-size:10.5px;font-weight:800;padding:3px 7px;border-radius:6px;background:var(--accent);
  color:#fff;letter-spacing:.3px;white-space:nowrap}
.tile.isnew{border-color:var(--accent)!important;box-shadow:0 0 0 1px var(--accent-border),var(--shadow)}
.empty{text-align:center;padding:80px 20px;color:var(--text3)}
.empty .big{font-family:'Fraunces';font-size:22px;color:var(--text2);margin-bottom:8px}

/* ---------- MODAL ---------- */
.overlay{position:fixed;inset:0;background:rgba(20,16,10,.5);backdrop-filter:blur(3px);z-index:100;
  display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;width:100%;
  max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,.3);margin:auto}
.modal-head{padding:22px 24px;border-bottom:1px solid var(--border);display:flex;
  justify-content:space-between;align-items:flex-start;gap:12px}
.modal-head h2{font-size:21px;font-weight:600;letter-spacing:-.4px}
.x{font-size:22px;color:var(--text3);line-height:1;padding:2px 6px;border-radius:6px}
.x:hover{background:var(--surface2);color:var(--text)}
.modal-body{padding:22px 24px;max-height:62vh;overflow-y:auto}
.modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.field textarea{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:10px;
  background:var(--inset);color:var(--text);outline:none;resize:vertical;min-height:72px}
.field select{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:10px;
  background:var(--inset);color:var(--text);outline:none}
.field textarea:focus,.field select:focus{border-color:var(--accent);background:var(--surface)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hint{font-size:12px;color:var(--text3);margin-top:4px}

/* detail */
.detail-meta{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
.section-label{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);
  font-weight:700;margin:22px 0 10px}
.thread{display:flex;flex-direction:column;gap:12px}
.msg{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:11px 13px}
.msg.mine{background:var(--accent-bg);border-color:var(--accent-border)}
.msg-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px}
.msg-author{font-weight:700;font-size:13px}
.msg-time{font-size:11.5px;color:var(--text3)}
.msg-body{font-size:14px;white-space:pre-wrap;word-break:break-word}
.composer{display:flex;gap:8px;margin-top:12px}
.composer textarea{flex:1;min-height:42px;padding:10px 12px;border:1px solid var(--border2);
  border-radius:10px;background:var(--inset);color:var(--text);outline:none;resize:vertical}
.composer textarea:focus{border-color:var(--accent);background:var(--surface)}
.docs{display:flex;flex-direction:column;gap:8px}
.doc{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:9px 12px;font-size:13.5px}
.doc a{color:var(--accent);font-weight:600;text-decoration:none}
.doc a:hover{text-decoration:underline}
.doc .dmeta{color:var(--text3);font-size:12px;margin-left:auto}
.uploadbox{border:1.5px dashed var(--border2);border-radius:12px;padding:18px;text-align:center;
  color:var(--text2);font-size:13.5px;cursor:pointer;transition:.12s}
.uploadbox:hover{border-color:var(--accent);color:var(--accent)}

/* admin */
.urow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.urow .av{width:34px;height:34px;border-radius:50%;background:var(--accent);display:grid;place-items:center;
  color:#fff;font-weight:700;font-size:14px;flex:none}
.rolepill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--surface2);
  border:1px solid var(--border);text-transform:uppercase;letter-spacing:.4px}
.invite-box{background:var(--inset);border:1px solid var(--border);border-radius:10px;padding:11px;
  font-family:monospace;font-size:12.5px;word-break:break-all;margin-top:10px;display:flex;gap:8px;align-items:center}
.fab{position:fixed;right:30px;bottom:30px;width:auto;padding:14px 22px;border-radius:30px;
  background:var(--accent);color:#fff;font-weight:700;box-shadow:0 8px 24px rgba(180,71,31,.4);
  display:flex;align-items:center;gap:8px;z-index:30;transition:.15s}
.fab:hover{transform:translateY(-2px) scale(1.02)}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--text);
  color:var(--bg);padding:12px 20px;border-radius:10px;font-weight:600;font-size:14px;z-index:200;
  box-shadow:0 8px 24px rgba(0,0,0,.3);animation:pop .25s}
@keyframes pop{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
@media(max-width:780px){
  .sidebar{display:none}
  .content{padding:18px}
  .topbar{padding:16px 18px}
}
</style>
</head>
<body>

<!-- ============ AUTH ============ -->
<div id="auth">
  <div class="auth-card">
    <div class="brand"><div class="mark">U</div><div class="name">ULEReminders</div></div>

    <!-- LOGIN -->
    <div id="loginView">
      <p class="sub">Task reminders, conversations & documents — all in one place.</p>
      <div class="field"><label>Username</label><input id="li-user" autocomplete="username"></div>
      <div class="field"><label>Password</label><input id="li-pass" type="password" autocomplete="current-password"></div>
      <button class="btn btn-primary" onclick="doLogin()">Sign in</button>
      <div class="err" id="li-err"></div>
    </div>

    <!-- REGISTER (via invite) -->
    <div id="regView" class="hidden">
      <p class="sub">You've been invited. Create your account.</p>
      <div class="field"><label>Username</label><input id="rg-user"></div>
      <div class="field"><label>Email <span style="color:var(--text3)">(for notifications)</span></label><input id="rg-email" type="email"></div>
      <div class="field"><label>Password</label><input id="rg-pass" type="password"></div>
      <button class="btn btn-primary" onclick="doRegister()">Create account</button>
      <div class="err" id="rg-err"></div>
    </div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <aside class="sidebar">
    <div class="brand"><div class="mark">U</div><div class="name">ULEReminders</div></div>

    <div class="sidebar-sec">
      <h4>Status</h4>
      <button class="nav-item active" data-status="all" onclick="setStatusFilter('all',this)">All tiles <span class="nav-count" id="c-all">0</span></button>
      <button class="nav-item" data-status="open" onclick="setStatusFilter('open',this)">Open <span class="nav-count" id="c-open">0</span></button>
      <button class="nav-item" data-status="in_progress" onclick="setStatusFilter('in_progress',this)">In progress <span class="nav-count" id="c-prog">0</span></button>
      <button class="nav-item" data-status="done" onclick="setStatusFilter('done',this)">Done <span class="nav-count" id="c-done">0</span></button>
    </div>

    <div class="sidebar-sec">
      <h4>View</h4>
      <button class="nav-item active" data-owner="all" onclick="setOwnerFilter('all',this)" title="Every tile">All tiles <span class="nav-count" id="o-all">0</span></button>
      <button class="nav-item" data-owner="outgoing" onclick="setOwnerFilter('outgoing',this)" title="Tiles you created">Outgoing <span class="nav-count" id="o-out">0</span></button>
      <button class="nav-item" data-owner="incoming" onclick="setOwnerFilter('incoming',this)" title="Tiles where you're the Person or on the notify list">Incoming <span class="nav-count" id="o-in">0</span></button>
    </div>

    <div class="sidebar-foot">
      <button class="nav-item hidden" id="adminBtn" onclick="openAdmin()" style="margin-bottom:10px">⚙ Admin panel</button>
      <div class="user-chip"><div class="av" id="me-av">U</div><div><div id="me-name" style="font-weight:600;color:#fff"></div><div id="me-role" style="font-size:11px;opacity:.6"></div></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:12px">
        <button class="linkbtn" onclick="toggleTheme()">◐ Theme</button>
        <button class="linkbtn" onclick="logout()">Sign out</button>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h1>Reminders</h1>
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search" placeholder="Search tiles…" oninput="render()">
      </div>
    </div>

    <div class="content">
      <div class="filters">
        <select id="jobFilter" onchange="render()"><option value="">All jobs</option></select>
        <select id="personFilter" onchange="render()"><option value="">All people</option></select>
        <div class="spacer"></div>
      </div>
      <div id="grid" class="grid"></div>
    </div>
  </div>

  <button class="fab" onclick="openNewTile()">＋ New tile</button>
</div>

<div id="modalRoot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================================
//  CONFIG — fill these in after Supabase setup
// ============================================================
const SB_URL  = 'https://uuqhoavwbsllhjidigwf.supabase.co';
const SB_KEY  = 'sb_publishable_DdPGqeasUFxNsTddsO7YxQ_Ga1TWUIK';
const EMAIL_FN = SB_URL + '/functions/v1/send-update';   // edge function for auto-emails
const APP_URL  = window.location.origin + window.location.pathname; // used in email links
const SALT = 'ule-salt-2024';

const HDR = {'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=representation'};

// ---------- Supabase REST helpers ----------
async function sbGet(t,q=''){const r=await fetch(`${SB_URL}/rest/v1/${t}?${q}`,{headers:HDR});return r.ok?r.json():[]}
async function sbPost(t,b){const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:HDR,body:JSON.stringify(b)});return r.ok?r.json():null}
async function sbPatch(t,id,b){const r=await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:HDR,body:JSON.stringify(b)});return r.ok?r.json():null}
async function sbDelete(t,q){await fetch(`${SB_URL}/rest/v1/${t}?${q}`,{method:'DELETE',headers:HDR})}

// ---------- auth ----------
function hashPassword(p){const s=p+SALT;let h1=5381,h2=52711;for(let i=0;i<s.length;i++){const c=s.charCodeAt(i);h1=(Math.imul(31,h1)+c)|0;h2=(Math.imul(31,h2)+c)|0;}return (h1>>>0).toString(16).padStart(8,'0')+(h2>>>0).toString(16).padStart(8,'0');}

let currentUser=null, tiles=[], usersCache=[];
let statusFilter='all';
let ownerFilter='all';

async function doLogin(){
  const u=val('li-user').trim(), p=val('li-pass');
  if(!u||!p){return setErr('li-err','Enter username and password')}
  const rows=await sbGet('users',`username=eq.${encodeURIComponent(u)}&select=*`);
  if(!rows.length){return setErr('li-err','User not found')}
  if(rows[0].password_hash!==hashPassword(p)){return setErr('li-err','Incorrect password')}
  currentUser={id:rows[0].id,username:rows[0].username,email:rows[0].email,role:rows[0].role};
  localStorage.setItem('ule-session',JSON.stringify(currentUser));
  enterApp();
}

async function doRegister(){
  const tok=new URLSearchParams(location.search).get('invite');
  const u=val('rg-user').trim(), e=val('rg-email').trim(), p=val('rg-pass');
  if(!u||!p){return setErr('rg-err','Username and password required')}
  const inv=await sbGet('invites',`token=eq.${tok}&used_at=is.null&select=*`);
  if(!inv.length){return setErr('rg-err','Invite is invalid or already used')}
  const exists=await sbGet('users',`username=eq.${encodeURIComponent(u)}&select=id`);
  if(exists.length){return setErr('rg-err','Username taken')}
  const made=await sbPost('users',{username:u,email:e,password_hash:hashPassword(p),role:'member'});
  if(!made){return setErr('rg-err','Could not create account')}
  await sbPatch('invites',inv[0].id,{used_at:new Date().toISOString(),used_by:made[0].id});
  currentUser={id:made[0].id,username:u,email:e,role:'member'};
  localStorage.setItem('ule-session',JSON.stringify(currentUser));
  history.replaceState({},'',APP_URL);
  enterApp();
}

function logout(){localStorage.removeItem('ule-session');location.reload();}

function boot(){
  const theme=localStorage.getItem('ule-theme'); if(theme)document.documentElement.setAttribute('data-theme',theme);
  const inv=new URLSearchParams(location.search).get('invite');
  if(inv){show('loginView',false);show('regView',true);return;}
  const s=localStorage.getItem('ule-session');
  if(s){currentUser=JSON.parse(s);enterApp();}
}

async function enterApp(){
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('me-name').textContent=currentUser.username;
  document.getElementById('me-role').textContent=currentUser.role;
  document.getElementById('me-av').textContent=currentUser.username[0].toUpperCase();
  if(currentUser.role==='admin')document.getElementById('adminBtn').classList.remove('hidden');
  loadSeen();
  await loadAll();
  setInterval(loadAll,30000); // poll for real-time-ish sync
}

async function loadAll(){
  const oldMap={}; tiles.forEach(t=>oldMap[t.id]=t.updated_at);
  tiles=await sbGet('tiles','select=*&order=updated_at.desc');
  usersCache=await sbGet('users','select=username,email');
  if(!seenInit){ tiles.forEach(t=>{seen[t.id]=t.updated_at}); seenInit=true; saveSeen(); }
  else {
    const fresh=tiles.filter(t=>oldMap[t.id]!==t.updated_at && isNew(t));
    if(fresh.length){ toast(`🔔 New activity on ${fresh.length} tile${fresh.length>1?'s':''}`); }
  }
  buildFilterOptions();
  render();
}

// ---------- filters / rendering ----------
function setStatusFilter(s,el){statusFilter=s;document.querySelectorAll('.nav-item[data-status]').forEach(n=>n.classList.remove('active'));el.classList.add('active');render();}
function setOwnerFilter(o,el){ownerFilter=o;document.querySelectorAll('.nav-item[data-owner]').forEach(n=>n.classList.remove('active'));el.classList.add('active');render();}

// A tile is "outgoing" if the current user created it.
function isOutgoing(t){return !!(currentUser&&t.created_by_username&&t.created_by_username.toLowerCase()===currentUser.username.toLowerCase());}
// A tile is "incoming" if it's addressed to the current user: they are the Person, or their email is on the notify list.
function isIncoming(t){
  if(!currentUser)return false;
  const email=(currentUser.email||'').toLowerCase();
  const uname=(currentUser.username||'').toLowerCase();
  const inWatchers=!!email&&(t.watchers||[]).some(w=>(w||'').toLowerCase()===email);
  const isPerson=!!uname&&(t.person||'').toLowerCase()===uname;
  return inWatchers||isPerson;
}

// ---------- "new activity" tracking (per-tile last-seen, stored locally) ----------
let seen={}, seenInit=false;
let openDocs=[];
function loadSeen(){ try{const s=localStorage.getItem('ule-seen'); if(s){seen=JSON.parse(s); seenInit=true;} else {seen={}; seenInit=false;}}catch(e){seen={}; seenInit=false;} }
function saveSeen(){ try{localStorage.setItem('ule-seen',JSON.stringify(seen));}catch(e){} }
function markSeen(id){ const t=tiles.find(x=>x.id===id); if(t){ seen[id]=t.updated_at; saveSeen(); } }
function isNew(t){ if(seen[t.id]===undefined) return true; return new Date(t.updated_at) > new Date(seen[t.id]); }

function buildFilterOptions(){
  const jobs=[...new Set(tiles.map(t=>t.job).filter(Boolean))].sort();
  const ppl=[...new Set(tiles.map(t=>t.person).filter(Boolean))].sort();
  const jf=document.getElementById('jobFilter'), pf=document.getElementById('personFilter');
  const jv=jf.value, pv=pf.value;
  jf.innerHTML='<option value="">All jobs</option>'+jobs.map(j=>`<option>${esc(j)}</option>`).join('');
  pf.innerHTML='<option value="">All people</option>'+ppl.map(p=>`<option>${esc(p)}</option>`).join('');
  jf.value=jv; pf.value=pv;
}

function render(){
  const q=val('search').toLowerCase();
  const jf=document.getElementById('jobFilter').value;
  const pf=document.getElementById('personFilter').value;
  let list=tiles.filter(t=>{
    if(statusFilter!=='all'&&t.status!==statusFilter)return false;
    if(ownerFilter==='outgoing'&&!isOutgoing(t))return false;
    if(ownerFilter==='incoming'&&!isIncoming(t))return false;
    if(jf&&t.job!==jf)return false;
    if(pf&&t.person!==pf)return false;
    if(q){const hay=(t.title+' '+(t.description||'')+' '+(t.job||'')+' '+(t.person||'')+' '+(t.tags||[]).join(' ')).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
  // counts
  document.getElementById('c-all').textContent=tiles.length;
  document.getElementById('c-open').textContent=tiles.filter(t=>t.status==='open').length;
  document.getElementById('c-prog').textContent=tiles.filter(t=>t.status==='in_progress').length;
  document.getElementById('c-done').textContent=tiles.filter(t=>t.status==='done').length;
  document.getElementById('o-all').textContent=tiles.length;
  document.getElementById('o-out').textContent=tiles.filter(isOutgoing).length;
  document.getElementById('o-in').textContent=tiles.filter(isIncoming).length;

  const g=document.getElementById('grid');
  if(!list.length){g.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="big">No tiles here yet</div><div>Create one with the “＋ New tile” button.</div></div>`;return;}
  g.innerHTML=list.map(t=>`
    <div class="tile ${isNew(t)?'isnew':''}" data-s="${t.status}" onclick="openTile('${t.id}')">
      <div class="tile-top">
        <h3>${esc(t.title)}</h3>
        <div class="tile-badges">
          ${isNew(t)?'<span class="new-pill">● New</span>':''}
          <span class="status-pill s-${t.status}">${statusLabel(t.status)}</span>
        </div>
      </div>
      ${t.description?`<div class="tile-desc">${esc(t.description)}</div>`:''}
      <div class="meta-row">
        ${t.job?`<span class="meta">🗂 <b>${esc(t.job)}</b></span>`:''}
        ${t.person?`<span class="meta">👤 <b>${esc(t.person)}</b></span>`:''}
        ${t.due_date?`<span class="meta">📅 ${esc(t.due_date)}</span>`:''}
      </div>
      ${(t.tags&&t.tags.length)?`<div class="meta-row">${t.tags.map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div>`:''}
      <div class="tile-foot">
        <span>🕑 ${timeAgo(t.updated_at)}</span>
        ${(t.watchers&&t.watchers.length)?`<span>✉ ${t.watchers.length} watching</span>`:''}
      </div>
    </div>`).join('');
}

function statusLabel(s){return s==='in_progress'?'In progress':s==='done'?'Done':'Open'}

// Build the Person dropdown from the team (users table). Preserves any legacy free-text value.
function personOptions(selected){
  selected=selected||'';
  const names=usersCache.map(u=>u.username);
  let opts='<option value="">— none —</option>';
  if(selected&&!names.some(n=>(n||'').toLowerCase()===selected.toLowerCase())){
    opts+=`<option value="${esc(selected)}" selected>${esc(selected)} (not a member)</option>`;
  }
  opts+=usersCache.map(u=>{
    const sel=(u.username||'').toLowerCase()===selected.toLowerCase()?'selected':'';
    return `<option value="${esc(u.username)}" data-email="${esc(u.email||'')}" ${sel}>${esc(u.username)}${u.email?'':' (no email)'}</option>`;
  }).join('');
  return opts;
}
// When a person is selected, auto-add their email to the notify list so they get notified.
function onPersonChange(){
  const sel=document.getElementById('f-person');
  const opt=sel.options[sel.selectedIndex];
  const email=opt?(opt.getAttribute('data-email')||''):'';
  if(!email)return;
  const w=document.getElementById('f-watchers');
  const list=splitList(w.value);
  if(!list.some(e=>e.toLowerCase()===email.toLowerCase())){ list.push(email); w.value=list.join(', '); }
}

async function saveTile(id){
  const title=val('f-title').trim(); if(!title)return toast('Title is required');
  const body={
    title,
    description:val('f-desc').trim(),
    job:val('f-job').trim(),
    person:val('f-person').trim(),
    status:val('f-status'),
    due_date:val('f-due'),
    tags:splitList(val('f-tags')),
    watchers:splitList(val('f-watchers')),
    updated_at:new Date().toISOString()
  };
  if(id){
    const prev=tiles.find(t=>t.id===id);
    await sbPatch('tiles',id,body);
    seen[id]=body.updated_at; saveSeen();
    closeModal(); await loadAll(); openTile(id);
    if(prev&&prev.status!==body.status)
      notify(body,`Status changed to “${statusLabel(body.status)}”`,`${currentUser.username} updated this tile's status to ${statusLabel(body.status)}.`);
  }else{
    body.created_by_username=currentUser.username;
    const made=await sbPost('tiles',body);
    if(made&&made[0]){ seen[made[0].id]=body.updated_at; saveSeen(); }
    closeModal(); await loadAll();
    if(made)notify(body,'New tile created',`${currentUser.username} created a new reminder: “${title}”.`);
    toast('Tile created');
  }
}

// ---------- tile detail (thread + docs) ----------
async function openTile(id){
  const t=tiles.find(x=>x.id===id); if(!t)return;
  markSeen(id); render();
  const [msgs,docs]=await Promise.all([
    sbGet('messages',`tile_id=eq.${id}&select=*&order=created_at.asc`),
    sbGet('attachments',`tile_id=eq.${id}&select=*&order=created_at.asc`)
  ]);
  openDocs=docs;
  const canDelete=currentUser.role==='admin';
  modal(`
    <div class="modal-head">
      <div>
        <h2>${esc(t.title)}</h2>
        <div style="margin-top:8px"><span class="status-pill s-${t.status}">${statusLabel(t.status)}</span></div>
      </div>
      <button class="x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      ${t.description?`<div style="color:var(--text2);margin-bottom:14px">${esc(t.description)}</div>`:''}
      <div class="detail-meta">
        ${t.job?`<span class="meta">🗂 <b>${esc(t.job)}</b></span>`:''}
        ${t.person?`<span class="meta">👤 <b>${esc(t.person)}</b></span>`:''}
        ${t.due_date?`<span class="meta">📅 ${esc(t.due_date)}</span>`:''}
        ${(t.watchers&&t.watchers.length)?`<span class="meta">✉ ${t.watchers.map(esc).join(', ')}</span>`:''}
      </div>
      ${(t.tags&&t.tags.length)?`<div class="detail-meta">${t.tags.map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div>`:''}

      <div class="field"><label>Status</label>
        <select id="d-status" onchange="quickStatus('${t.id}')">
          <option value="open" ${t.status==='open'?'selected':''}>Open</option>
          <option value="in_progress" ${t.status==='in_progress'?'selected':''}>In progress</option>
          <option value="done" ${t.status==='done'?'selected':''}>Done</option>
        </select></div>

      <div class="section-label">Documents</div>
      <div class="docs" id="docList">
        ${docs.length?docs.map(d=>`
          <div class="doc">📎 <a href="${SB_URL}/storage/v1/object/public/tile-docs/${encodeURIComponent(d.file_path)}" target="_blank">${esc(d.file_name)}</a>
          <span class="dmeta">${esc(d.uploaded_by_username||'')} · ${timeAgo(d.created_at)}</span>
          ${(currentUser.role==='admin'||d.uploaded_by_username===currentUser.username)?`<button class="x" title="delete document" style="margin-left:8px" onclick="deleteDoc('${t.id}','${d.id}')">×</button>`:''}
          </div>`).join('')
          :'<div style="color:var(--text3);font-size:13px">No documents yet.</div>'}
      </div>
      <div class="uploadbox" onclick="document.getElementById('fileIn').click()" id="dropbox">
        ⬆ Click to upload a document to this tile
      </div>
      <input type="file" id="fileIn" class="hidden" onchange="uploadDoc('${t.id}')">

      <div class="section-label">Conversation</div>
      <div class="thread" id="thread">
        ${msgs.length?msgs.map(m=>`
          <div class="msg ${m.author_username===currentUser.username?'mine':''}">
            <div class="msg-head"><span class="msg-author">${esc(m.author_username||'—')}</span><span class="msg-time">${fmtTime(m.created_at)}</span></div>
            <div class="msg-body">${esc(m.body)}</div>
          </div>`).join('')
          :'<div style="color:var(--text3);font-size:13px">No messages yet — start the conversation.</div>'}
      </div>
      <div class="composer">
        <textarea id="msgIn" placeholder="Write a reply…" onkeydown="if(event.key==='Enter'&&(event.metaKey||event.ctrlKey)){sendMsg('${t.id}')}"></textarea>
        <button class="btn btn-primary" style="width:auto;align-self:flex-end" onclick="sendMsg('${t.id}')">Send</button>
      </div>
      <div class="hint">⌘/Ctrl + Enter to send. Everyone on the notify list gets emailed.</div>
    </div>
    <div class="modal-foot">
      ${canDelete?`<button class="btn btn-ghost" style="width:auto;color:var(--accent)" onclick="deleteTile('${t.id}')">Delete tile</button>`:''}
      <button class="btn btn-ghost" style="width:auto" onclick="tileForm(${JSON.stringify(t).replace(/"/g,'&quot;')})">Edit details</button>
      <button class="btn btn-primary" style="width:auto" onclick="closeModal()">Done</button>
    </div>`);
}

async function quickStatus(id){
  const t=tiles.find(x=>x.id===id); const s=val('d-status'); if(t.status===s)return;
  const now=new Date().toISOString();
  await sbPatch('tiles',id,{status:s,updated_at:now});
  seen[id]=now; saveSeen();
  const updated={...t,status:s};
  await loadAll();
  notify(updated,`Status: ${statusLabel(s)}`,`${currentUser.username} set “${t.title}” to ${statusLabel(s)}.`);
  toast('Status updated');
}

async function sendMsg(id){
  const body=val('msgIn').trim(); if(!body)return;
  const t=tiles.find(x=>x.id===id);
  await sbPost('messages',{tile_id:id,author_username:currentUser.username,body});
  const now=new Date().toISOString();
  await sbPatch('tiles',id,{updated_at:now});
  seen[id]=now; saveSeen();
  document.getElementById('msgIn').value='';
  await loadAll(); openTile(id);
  notify(t,`New message on “${t.title}”`,`<b>${currentUser.username}</b> wrote:<br><br>${esc(body)}`);
}

async function uploadDoc(id){
  const f=document.getElementById('fileIn').files[0]; if(!f)return;
  document.getElementById('dropbox').textContent='Uploading…';
  const path=`${id}/${Date.now()}_${f.name}`;
  const up=await fetch(`${SB_URL}/storage/v1/object/tile-docs/${encodeURIComponent(path)}`,{
    method:'POST',headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':f.type||'application/octet-stream'},body:f});
  if(!up.ok){toast('Upload failed');return}
  await sbPost('attachments',{tile_id:id,file_name:f.name,file_path:path,uploaded_by_username:currentUser.username});
  const t=tiles.find(x=>x.id===id);
  const now=new Date().toISOString();
  await sbPatch('tiles',id,{updated_at:now});
  seen[id]=now; saveSeen();
  await loadAll(); openTile(id);
  notify(t,`Document added to “${t.title}”`,`${currentUser.username} uploaded <b>${esc(f.name)}</b>.`);
  toast('Document uploaded');
}

async function deleteDoc(tileId,attId){
  const d=openDocs.find(x=>x.id===attId); if(!d)return;
  if(!confirm(`Delete "${d.file_name}"? This cannot be undone.`))return;
  try{ await fetch(`${SB_URL}/storage/v1/object/tile-docs/${encodeURIComponent(d.file_path)}`,{method:'DELETE',headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}}); }catch(e){}
  await sbDelete('attachments',`id=eq.${attId}`);
  const now=new Date().toISOString();
  await sbPatch('tiles',tileId,{updated_at:now}); seen[tileId]=now; saveSeen();
  await loadAll(); openTile(tileId);
  toast('Document deleted');
}

async function deleteTile(id){
  if(!confirm('Delete this tile, its messages and documents? This cannot be undone.'))return;
  await sbDelete('messages',`tile_id=eq.${id}`);
  await sbDelete('attachments',`tile_id=eq.${id}`);
  await sbDelete('tiles',`id=eq.${id}`);
  closeModal(); await loadAll(); toast('Tile deleted');
}

// ---------- auto-email ----------
async function notify(tile,subject,htmlBody){
  const to=(tile.watchers||[]).filter(Boolean);
  if(!to.length)return;
  const html=`<div style="font-family:sans-serif;max-width:520px;margin:auto">
    <div style="background:#211f1a;color:#fff;padding:16px 20px;border-radius:12px 12px 0 0;font-weight:700">ULEReminders</div>
    <div style="border:1px solid #e0dccf;border-top:none;border-radius:0 0 12px 12px;padding:20px">
      <h2 style="margin:0 0 6px">${esc(tile.title)}</h2>
      <div style="color:#6c685c;font-size:13px;margin-bottom:14px">${tile.job?'Job: '+esc(tile.job):''} ${tile.person?' · '+esc(tile.person):''}</div>
      <div style="font-size:15px;line-height:1.6">${htmlBody}</div>
      <a href="${APP_URL}" style="display:inline-block;margin-top:18px;background:#b4471f;color:#fff;padding:10px 18px;border-radius:8px;text-decoration:none;font-weight:600">Open ULEReminders</a>
    </div></div>`;
  try{
    await fetch(EMAIL_FN,{method:'POST',headers:{'Content-Type':'application/json',apikey:SB_KEY,Authorization:'Bearer '+SB_KEY},
      body:JSON.stringify({to,subject,html})});
  }catch(e){console.warn('email send failed',e)}
}

async function addContact(){
  const name=val('c-name').trim(), email=val('c-email').trim();
  if(!name||!email)return toast('Name and email required');
  const exists=await sbGet('users',`username=eq.${encodeURIComponent(name)}&select=id`);
  if(exists.length)return toast('That name is already taken');
  const made=await sbPost('users',{username:name,email,password_hash:'no-login',role:'contact'});
  if(!made)return toast('Could not add contact');
  await loadAll(); openAdmin(); toast('Contact added');
}
async function genInvite(){
  const token=crypto.randomUUID();
  await sbPost('invites',{token,created_by:currentUser.id});
  openAdmin();
}
async function removeUser(id){ if(!confirm('Remove this user?'))return; await sbDelete('users',`id=eq.${id}`); openAdmin(); }

// ---------- utilities ----------
function val(id){return document.getElementById(id).value}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function splitList(s){return s.split(',').map(x=>x.trim()).filter(Boolean)}
function setErr(id,m){document.getElementById(id).textContent=m}
function show(id,v){document.getElementById(id).classList.toggle('hidden',!v)}
function modal(html){document.getElementById('modalRoot').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`}
function closeModal(){document.getElementById('modalRoot').innerHTML=''}
function toggleTheme(){const d=document.documentElement;const n=d.getAttribute('data-theme')==='dark'?'light':'dark';d.setAttribute('data-theme',n);localStorage.setItem('ule-theme',n)}
function toast(m){const e=document.createElement('div');e.className='toast';e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),2200)}
function copyText(t){navigator.clipboard.writeText(t);toast('Copied to clipboard')}
function fmtTime(iso){const d=new Date(iso);return d.toLocaleString([], {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}
function timeAgo(iso){const s=(Date.now()-new Date(iso))/1000;if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'}
